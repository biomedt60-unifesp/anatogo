<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecionando…</title>
    <script>
      sessionStorage.setItem(
        'gh-pages-redirect',
        location.pathname + location.search + location.hash,
      )
      var base = location.pathname.split('/').filter(Boolean)[0]
      location.replace('/' + (base ? base + '/' : ''))
    </script>
  </head>
  <body></body>
</html>
